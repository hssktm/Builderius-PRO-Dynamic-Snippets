name: Auto Update Snippet Table

on:
  push:
    branches:
      - main
    paths:
      - '**/snippet'
      - '**/README.md'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/update-readme.js

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Auto update snippet table" || exit 0
          git push
